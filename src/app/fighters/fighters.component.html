<section class="w-full bg-gray-900 py-12">
  <div
    class="max-w-6xl mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
  >
    @for (fighter of fighters(); track fighter.name) {
      <div
        class="relative h-80 rounded-lg overflow-hidden cursor-pointer group bg-cover bg-center transition transform hover:scale-105 shadow-lg bg-top"
        [style.background-image]="'url(' + fighter.imgUrl + ')'"
      >
        <div
          class="absolute inset-0 bg-black/30 group-hover:bg-black/20 transition"
        ></div>

        <div
          class="relative z-10 flex flex-col justify-end h-full p-4 bg-gradient-to-t from-black/60 to-transparent"
        >
          <h3 class="text-white text-xl font-bold">{{ fighter.name }}</h3>
          <p class="text-gray-400 text-sm italic mb-2">"{{ fighter.nickname }}"</p>
          <p class="text-gray-300 text-sm">
            {{ fighter.weight }} lbs | {{ fighter.placeOfBirth }}
          </p>
          <p class="text-gray-300 text-sm">
            Record: {{ fighter.wins }}-{{ fighter.losses }}-{{ fighter.draws }}
          </p>
        </div>
      </div>
    }
  </div>
</section>
